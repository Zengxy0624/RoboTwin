name: task_config

image_shape: [3, -1, -1]   # unused (tokens precomputed) but train.py writes to it

# tok_n / tok_c are the frozen encoder's token grid: dinov3=196x1024, clip=256x1024,
# depth_v2=1369x1024, sam3=256x1024, vjepa=256x1024. Override per encoder.
shape_meta: &shape_meta
  obs:
    head_cam_tokens:
      shape: ["${tok_n}", "${tok_c}"]
      type: low_dim
    agent_pos:
      shape: [14]
      type: low_dim
  action:
    shape: [14]

dataset:
  _target_: dit_dataset.RobotTokenDataset
  zarr_path: data/useless.tokzarr
  batch_size: ${dataloader.batch_size}
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: null
  normalize_tokens: ${normalize_tokens}
