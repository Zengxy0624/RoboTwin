defaults:
  - _self_
  - task: default_task_dit_14

name: robot_dit_${task.name}
_target_: diffusion_policy.workspace.robotworkspace.RobotWorkspace

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "default"
encoder_tag: dinov3   # ckpt namespace; override per encoder (bare name; DiT reads raw tokens, no spatial-softmax)
tok_n: 196               # tokens per frame (dinov3=196); override per encoder
tok_c: 1024              # token width (dinov3=1024); override per encoder
normalize_tokens: False  # VFM features are fine raw

horizon: 8
n_obs_steps: 2
n_action_steps: 6
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
past_action_visible: False
keypoint_visible_rate: 1.0

policy:
  _target_: dit.policy.DiffusionDiTPolicy

  shape_meta: ${shape_meta}

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small
    clip_sample: True
    prediction_type: epsilon

  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 100
  normalize_tokens: ${normalize_tokens}

  # small DiT
  hidden_size: 384
  depth: 6
  num_heads: 6
  mlp_ratio: 1.0

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 384   # Quincy's robotwin-dino setup (needs ~96GB for SAM tokens; train==val required)
  num_workers: 0
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 384   # Quincy's robotwin-dino setup (needs ~96GB for SAM tokens; train==val required)
  num_workers: 0
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4              # same as Quincy
  betas: [0.9, 0.999]    # Quincy
  eps: 1.0e-8
  weight_decay: 0.04     # Quincy (was 1e-6; strong wd -- VALIDATE on one task, tuned for his 130M)

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: True
  lr_scheduler: cosine
  lr_warmup_steps: 1500   # Quincy: 5 epochs x 300 ipe = 1500 warmup steps
  num_epochs: 600         # nominal label only (filename 600.ckpt); real stop = max_global_steps
  gradient_accumulate_every: 1
  use_ema: True
  freeze_encoder: False
  rollout_every: 50
  checkpoint_every: 300
  val_every: 1
  sample_every: 5
  max_train_steps: null
  # Total optimization-step budget. null => train the full num_epochs (old behavior).
  # When set, the cosine LR anneals within this many steps, training stops at this
  # step count, and the final weights are saved as <num_epochs>.ckpt (so the eval
  # driver path is unchanged). Equalizes wall-clock across tasks (Quincy-style).
  max_global_steps: 12000   # ~300 epoch-equiv @ batch 384 (~4.6M samples): 2x Quincy's "converges", 0.5x RoboTwin's 600ep default
  # If set, also dump step{N}.ckpt every N steps (for probing the convergence plateau).
  checkpoint_every_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

logging:
  project: diffusion_policy_debug
  resume: True
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["${name}", "${task_name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 5
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}

setting: null
expert_data_num: null
head_camera_type: null
